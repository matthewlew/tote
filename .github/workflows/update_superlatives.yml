name: Update Superlative Lists

on:
  schedule:
    - cron: '0 5 * * *' # Run daily at 5am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-superlatives:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script to update superlative lists
        run: python3 generate_superlatives.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update automated superlative category lists"
          file_pattern: "data/*.json"
