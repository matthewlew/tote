<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Tote: A neighborhood-focused directory for discovering local businesses in NYC. Skip the map and find cafes, shops, and restaurants in a fast, scannable list.">
<meta name="keywords" content="NYC, neighborhoods, local businesses, Brooklyn, cafes, restaurants, directory, local guides">
<title>Tote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Flor de Ruina Semilla';
  src: url('./fonts/FlorDeRuina-Semilla.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:   #000;
  --bg:    #fff;
  --accent: #ccff00; /* Harsh yellow-green */
  --rule:  #000;
}
html { font-size: 16px; }
body {
  font-family: "Faculty Glyphic", sans-serif;
  font-weight: normal;
  font-size: 1rem;
  line-height: 1.2;
  letter-spacing: 0.04em;
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--ink);
  min-height: 100vh;
}
*, input, button { font-family: inherit; font-size: inherit; font-weight: inherit; text-transform: inherit; color: inherit; background: none; border: none; }
a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--ink); }
a:hover { background: var(--accent); color: var(--ink); border-bottom-color: transparent; }
a:focus-visible { outline: 1px solid var(--accent); background: var(--ink); color: var(--bg); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

header {
  border-bottom: 1px solid var(--rule);
  padding: 20px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  background: var(--ink);
  color: var(--bg);
}
header span:first-child {
  font-family: 'Flor de Ruina Semilla', sans-serif;
  font-size: 2.5rem;
  letter-spacing: -1px;
}

.category-nav {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 10px;
}
.category-btn {
  padding: 4px 12px;
  border: 1px solid var(--rule);
  cursor: pointer;
  background: var(--bg);
  color: var(--ink);
  transition: all 0.2s;
}
.category-btn:hover {
  background: var(--accent);
}
.category-btn.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--bg);
}
.category-btn.active::before {
  content: '● ';
  font-size: 0.8em;
  color: var(--accent);
}

.meta { display: flex; gap: 16px; font-size: 0.8rem; }
.meta span+span::before { content:' // '; }

main { padding: 0; }

/* Header row for sorting */
.header-row {
  border-bottom: 1px solid var(--rule);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  background: #f0f0f0;
}
.header-label {
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  border: 1px solid transparent;
}
.header-label:hover { border-color: var(--ink); background: var(--accent); }
.header-label span.sort-indicator { font-size: 1rem; }
.header-spacer { flex:1; }

.row {
  border-bottom: 1px solid var(--rule);
  padding: 16px 20px;
  transition: all 0s; /* No soft transitions in brutalism */
}
.row:hover, .row:focus-visible {
  background: var(--ink);
  color: var(--bg);
}
.row:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
.row:hover .brand, .row:focus-visible .brand { color: var(--bg); }
.row:hover a, .row:focus-visible a { border-color: var(--bg); }
.row:hover a:hover, .row:focus-visible a:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }

.line { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: baseline; }
.name { font-size: 1rem; font-weight: bold; }
.brand { color: #555; font-style: italic; }
.row:hover .brand, .row:focus-visible .brand { color: #aaa; }

.row-desc { margin-top: 8px; font-size: 0.9rem; color: #444; line-height: 1.4; }
.row:hover .row-desc, .row:focus-visible .row-desc { color: #ccc; }

.row-address { font-size: 0.85rem; color: #666; font-family: monospace; }
.row:hover .row-address, .row:focus-visible .row-address { color: #ddd; }

.prices { display: flex; flex-wrap: wrap; gap: 8px 16px; }
.prices a {
  display: inline-flex;
  gap: 8px;
  align-items: baseline;
  padding: 4px 8px;
  border: 1px solid var(--ink);
  background: var(--bg);
  color: var(--ink);
}
.row:hover .prices a, .row:focus-visible .prices a {
  border-color: var(--bg);
}
.site { font-weight: bold; }
.amount { }
.ship { display: none; } /* Hide shipping for brutalist look */

footer {
  border-top: 1px solid var(--rule);
  padding: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  background: var(--ink);
  color: var(--bg);
}

@media (max-width:600px) {
  header, main .header-row, .row, footer { padding-left: 10px; padding-right: 10px; }
  .meta { flex-direction: column; gap: 4px; }
  .meta span+span::before { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span>TOTE</span>
    <nav class="category-nav" id="category-nav" aria-label="Categories">
      <!-- Nav buttons will be injected here -->
    </nav>
    <div class="location-controls" style="display: flex; gap: 12px; align-items: center; margin-top: 10px;">
      <button type="button" class="category-btn" id="locate-me-btn" aria-label="Locate Me">[l] Locate Me</button>
      <select id="neighborhood-select" class="category-btn" aria-label="Select Neighborhood">
        <option value="" disabled selected>Neighborhoods...</option>
      </select>
    </div>
  </div>
  <span class="meta"><span id="hd-n"></span><span>[←/→] Cats</span><span>[↑/↓] Navigate</span><span>[Enter] Open</span><span>40+ sources</span><span>Mar 2025</span></span>
</header>

<main aria-label="Items list">
  <div class="header-row">
    <button type="button" class="header-label" data-sort="brand">
      <span>[b] Brand</span>
      <span class="sort-indicator" data-indicator="brand">·</span>
    </button>
    <button type="button" class="header-label" data-sort="name">
      <span>[t] Title</span>
      <span class="sort-indicator" data-indicator="name">·</span>
    </button>
    <div class="header-spacer"></div>
  </div>

  <div id="list" aria-live="polite"></div>
</main>

<footer>
  <div style="display: flex; gap: 16px;">
    <span>Articles on the coolest totes on the web</span>
    <a href="/about.html">About Us</a>
  </div>
  <span>tote.so</span>
</footer>

<script>
(async function() {
  const listEl = document.getElementById('list');
  const sortButtons = document.querySelectorAll('.header-label');
  const countEl = document.getElementById('hd-n');
  const navEl = document.getElementById('category-nav');
  const locateMeBtn = document.getElementById('locate-me-btn');
  const neighborhoodSelect = document.getElementById('neighborhood-select');
  const indicators = {
    name: document.querySelector('[data-indicator="name"]'),
    brand: document.querySelector('[data-indicator="brand"]')
  };

  let categories = [];

  // ⚡ Bolt Optimization: Cache category data to prevent redundant network requests
  const categoryCache = {};

  let currentCategory = null;
  let items = [];
  let currentSort = { key: 'brand', direction: 'asc' };

  function initNeighborhoodDropdown() {
    neighborhoodSelect.innerHTML = '<option value="" disabled selected>Neighborhoods...</option>';
    categories.forEach(cat => {
      if (cat.latLng) {
        const option = document.createElement('option');
        option.value = cat.id;
        option.textContent = cat.name;
        neighborhoodSelect.appendChild(option);
      }
    });

    neighborhoodSelect.addEventListener('change', (e) => {
      const targetId = e.target.value;
      const targetCategory = categories.find(c => c.id === targetId);
      if (targetCategory && targetCategory.id !== currentCategory.id) {
        currentCategory = targetCategory;
        loadCategoryData();
      }
      e.target.value = ""; // Reset dropdown after selection
    });
  }

  function renderNav() {
    navEl.innerHTML = '';
    // Limit to displaying the top 5 neighborhoods in the top nav
    const visibleCategories = categories.slice(0, 5);
    visibleCategories.forEach((cat, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'category-btn';
      if (cat.id === currentCategory.id) {
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
      } else {
        btn.setAttribute('aria-pressed', 'false');
      }
      btn.textContent = `[${index + 1}] ${cat.name}`;
      btn.addEventListener('click', () => {
        if (cat.id !== currentCategory.id) {
          currentCategory = cat;
          loadCategoryData();
        }
      });
      navEl.appendChild(btn);
    });
  }

  async function loadCategoryData() {
    renderNav();
    listEl.innerHTML = 'Loading...';

    // ⚡ Bolt Optimization: Use cached data if available
    if (categoryCache[currentCategory.id]) {
      items = categoryCache[currentCategory.id].slice();
    } else {
      try {
        const res = await fetch(currentCategory.file);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();

        const categoryItems = data[currentCategory.dataKey] || [];
        categoryCache[currentCategory.id] = categoryItems;
        items = categoryItems.slice();
      } catch (err) {
        console.error('failed to load data', err);
        listEl.innerHTML = 'Error loading data.';
        items = [];
        return;
      }
    }

    currentSort = { key: 'brand', direction: 'asc' };
    sortItems();
    updateIndicators();
    render();
  }

  function sortItems() {
    const { key, direction } = currentSort;
    const dir = direction === 'asc' ? 1 : -1;

    items.sort((a, b) => {
      if (key === 'name') {
        return a.name.localeCompare(b.name) * dir;
      }
      if (key === 'brand') {
        return a.brand.localeCompare(b.brand) * dir;
      }
      if (key === 'price') {
        const p1 = typeof a.price === 'number' ? a.price : Infinity;
        const p2 = typeof b.price === 'number' ? b.price : Infinity;
        if (p1 === p2) return 0;
        return (p1 < p2 ? -1 : 1) * dir;
      }
      return 0;
    });
  }

  function updateIndicators() {
    Object.keys(indicators).forEach(k => {
      const el = indicators[k];
      if (!el) return;
      if (k === currentSort.key) {
        el.textContent = currentSort.direction === 'asc' ? '↑' : '↓';
      } else {
        el.textContent = '·';
      }
    });
  }

  function render() {
    listEl.innerHTML = '';
    countEl.textContent = `${items.length} ${currentCategory.unit}`;

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'row';
      row.tabIndex = 0; // Make row focusable via keyboard

      const line = document.createElement('div');
      line.className = 'line';

      const brand = document.createElement('span');
      brand.className = 'brand';
      brand.textContent = item.brand;

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = item.name;

      const prices = document.createElement('div');
      prices.className = 'prices';

      if (item.address) {
          const link = document.createElement('a');
          const encodedAddress = encodeURIComponent(item.name + ' ' + item.address);
          link.href = `https://www.google.com/maps/search/?api=1&query=${encodedAddress}`;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';

          const site = document.createElement('span');
          site.className = 'site';
          site.textContent = (currentCategory.actionText || 'VISIT') + ': MAP';

          link.appendChild(site);
          prices.appendChild(link);

          const addressSpan = document.createElement('span');
          addressSpan.className = 'row-address';
          addressSpan.textContent = item.address;
          line.appendChild(addressSpan);
      } else if (item.links && item.links.length > 0) {
        item.links.forEach(l => {
          const link = document.createElement('a');
          link.href = l.u;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';

          const site = document.createElement('span');
          site.className = 'site';
          site.textContent = (currentCategory.actionText || 'BUY') + ': ' + l.r;

          link.appendChild(site);

          if (typeof item.price === 'number') {
            const amount = document.createElement('span');
            amount.className = 'amount';
            amount.textContent = '$' + item.price.toLocaleString();
            link.appendChild(amount);
          }

          prices.appendChild(link);
        });
      }

      line.appendChild(brand);
      line.appendChild(name);
      line.appendChild(prices);
      row.appendChild(line);

      if (item.description) {
        const desc = document.createElement('div');
        desc.className = 'row-desc';
        desc.textContent = item.description;
        row.appendChild(desc);
      }

      listEl.appendChild(row);
    });
  }

  function handleSort(key) {
    if (currentSort.key === key) {
      currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
    } else {
      currentSort.key = key;
      currentSort.direction = 'asc';
    }
    sortItems();
    updateIndicators();
    render();
  }

  sortButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-sort');
      handleSort(key);
    });
  });

  // Haversine formula to calculate distance in miles
  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 3958.8; // Radius of the earth in miles
    const dLat = (lat2 - lat1) * (Math.PI / 180);
    const dLon = (lon2 - lon1) * (Math.PI / 180);
    const a =
      Math.sin(dLat/2) * Math.sin(dLat/2) +
      Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
      Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function handleLocateMe() {
    locateMeBtn.textContent = 'Locating...';
    locateMeBtn.disabled = true;

    if (!navigator.geolocation) {
      alert("Geolocation is not supported by your browser");
      resetLocateBtn();
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const userLat = position.coords.latitude;
        const userLng = position.coords.longitude;

        // Calculate distance for all categories
        categories.forEach(cat => {
          if (cat.latLng) {
            cat.distance = getDistance(userLat, userLng, cat.latLng[0], cat.latLng[1]);
          } else {
            cat.distance = Infinity;
          }
        });

        // Sort categories by distance
        categories.sort((a, b) => a.distance - b.distance);

        const closestCategory = categories[0];

        // Assuming NYC is roughly within a 50 mile radius of user if they are in NYC
        if (closestCategory.distance > 50) {
          alert("Only for NYC neighborhoods");
        } else {
          currentCategory = closestCategory;
          // Re-init dropdown and reload data with sorted categories
          initNeighborhoodDropdown();
          loadCategoryData();
        }
        resetLocateBtn();
      },
      (error) => {
        console.error("Geolocation error:", error);
        alert("Unable to retrieve your location");
        resetLocateBtn();
      },
      { timeout: 10000 }
    );
  }

  function resetLocateBtn() {
    locateMeBtn.textContent = '[l] Locate Me';
    locateMeBtn.disabled = false;
  }

  locateMeBtn.addEventListener('click', handleLocateMe);

  window.addEventListener('keydown', (e) => {
    // Ignore keydown if a modifier is pressed or if user is typing in an input
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    const num = parseInt(e.key, 10);
    // Bind numeric keys 1-5 to the visible categories
    if (!isNaN(num) && num >= 1 && num <= Math.min(categories.length, 5)) {
      const catIndex = num - 1;
      const targetCategory = categories[catIndex];
      if (targetCategory && targetCategory.id !== currentCategory.id) {
        currentCategory = targetCategory;
        loadCategoryData();
      }
      return;
    }

    const k = e.key.toLowerCase();

    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      const currentIdx = categories.findIndex(c => c.id === currentCategory.id);
      let nextIdx = e.key === 'ArrowLeft' ? currentIdx - 1 : currentIdx + 1;
      if (nextIdx < 0) nextIdx = categories.length - 1;
      if (nextIdx >= categories.length) nextIdx = 0;
      currentCategory = categories[nextIdx];
      loadCategoryData();
      return;
    }

    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      const rows = Array.from(listEl.querySelectorAll('.row'));
      if (rows.length === 0) return;
      const focusedIdx = rows.indexOf(document.activeElement);
      let nextIdx = e.key === 'ArrowUp' ? focusedIdx - 1 : focusedIdx + 1;
      if (focusedIdx === -1) nextIdx = 0;
      if (nextIdx < 0) nextIdx = rows.length - 1;
      if (nextIdx >= rows.length) nextIdx = 0;
      rows[nextIdx].focus();
      return;
    }

    if (e.key === 'Enter') {
      if (document.activeElement && document.activeElement.classList.contains('row')) {
        const link = document.activeElement.querySelector('a');
        if (link) {
          link.click();
          return;
        }
      }
    }

    if (k === 'b') {
      handleSort('brand');
    } else if (k === 't') {
      handleSort('name');
    } else if (k === 'l') {
      handleLocateMe();
    }
  });

  async function loadCategories() {
    try {
      const res = await fetch('/neighborhoods.json');
      if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
      categories = await res.json();
      currentCategory = categories[0];
      initNeighborhoodDropdown();
      loadCategoryData();
    } catch (err) {
      console.error('failed to load neighborhoods', err);
      listEl.innerHTML = 'Error loading neighborhoods.';
    }
  }

  // Init
  loadCategories();
})();
</script>
</body>
</html>
