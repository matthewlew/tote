<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tote</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:   #000;
  --bg:    #fff;
  --accent: #ccff00; /* Harsh yellow-green */
  --rule:  #000;
}
html { font-size: 16px; }
body {
  font-family: 'Courier New', Courier, monospace;
  font-weight: bold;
  font-size: 1rem;
  line-height: 1.2;
  background: var(--bg);
  color: var(--ink);
  text-transform: uppercase;
  border: 4px solid var(--ink);
  min-height: 100vh;
}
*, input, button { font-family: inherit; font-size: inherit; font-weight: inherit; text-transform: inherit; color: inherit; background: none; border: none; }
a { color: inherit; text-decoration: none; border-bottom: 2px solid var(--ink); }
a:hover { background: var(--accent); color: var(--ink); border-bottom-color: transparent; }
a:focus-visible { outline: 4px solid var(--accent); background: var(--ink); color: var(--bg); }

header {
  border-bottom: 4px solid var(--rule);
  padding: 20px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  background: var(--ink);
  color: var(--bg);
}
header span:first-child { font-size: 2rem; letter-spacing: -1px; }
.meta { display: flex; gap: 16px; font-size: 0.8rem; }
.meta span+span::before { content:' // '; }

main { padding: 0; }

/* Header row for sorting */
.header-row {
  border-bottom: 4px solid var(--rule);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  background: #f0f0f0;
}
.header-label {
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  border: 2px solid transparent;
}
.header-label:hover { border-color: var(--ink); background: var(--accent); }
.header-label span.sort-indicator { font-size: 1rem; }
.header-spacer { flex:1; }

.row {
  border-bottom: 2px solid var(--rule);
  padding: 16px 20px;
  transition: all 0s; /* No soft transitions in brutalism */
}
.row:hover {
  background: var(--ink);
  color: var(--bg);
}
.row:hover .brand { color: var(--bg); }
.row:hover a { border-color: var(--bg); }
.row:hover a:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }

.line { display: flex; flex-wrap: wrap; gap: 12px 24px; align-items: baseline; }
.name { font-size: 1.2rem; }
.brand { color: #555; }
.row:hover .brand { color: #aaa; }

.prices { display: flex; flex-wrap: wrap; gap: 8px 16px; }
.prices a {
  display: inline-flex;
  gap: 8px;
  align-items: baseline;
  padding: 4px 8px;
  border: 2px solid var(--ink);
  background: var(--bg);
  color: var(--ink);
}
.row:hover .prices a {
  border-color: var(--bg);
}
.site { font-weight: bold; }
.amount { }
.ship { display: none; } /* Hide shipping for brutalist look */

footer {
  border-top: 4px solid var(--rule);
  padding: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  background: var(--ink);
  color: var(--bg);
}

@media (max-width:600px) {
  header, main .header-row, .row, footer { padding-left: 10px; padding-right: 10px; }
  .meta { flex-direction: column; gap: 4px; }
  .meta span+span::before { display: none; }
}
</style>
</head>
<body>

<header>
  <span>TOTE</span>
  <span class="meta"><span id="hd-n">100 bags</span><span>40+ sources</span><span>Mar 2025</span></span>
</header>

<main aria-label="Tote bags list">
  <div class="header-row" aria-hidden="true">
    <button type="button" class="header-label" data-sort="brand">
      <span>Brand</span>
      <span class="sort-indicator" data-indicator="brand">·</span>
    </button>
    <button type="button" class="header-label" data-sort="name">
      <span>Title</span>
      <span class="sort-indicator" data-indicator="name">·</span>
    </button>
    <div class="header-spacer"></div>
  </div>

  <div id="list"></div>
</main>

<footer>
  <span>Articles on the coolest totes on the web</span>
  <span>tote.so</span>
</footer>

<script>
(async function() {
  const listEl = document.getElementById('list');
  const sortButtons = document.querySelectorAll('.header-label');
  const indicators = {
    name: document.querySelector('[data-indicator="name"]'),
    brand: document.querySelector('[data-indicator="brand"]')
  };

  let data;
  try {
    const res = await fetch('/data/bags.json');
    data = await res.json();
  } catch (err) {
    console.error('failed to load data', err);
    return;
  }

  let bags = data.bags.slice();
  let currentSort = { key: 'brand', direction: 'asc' };

  function sortBags() {
    const { key, direction } = currentSort;
    const dir = direction === 'asc' ? 1 : -1;

    bags.sort((a, b) => {
      if (key === 'name') {
        return a.name.localeCompare(b.name) * dir;
      }
      if (key === 'brand') {
        return a.brand.localeCompare(b.brand) * dir;
      }
      return 0;
    });
  }

  function updateIndicators() {
    Object.keys(indicators).forEach(k => {
      const el = indicators[k];
      if (!el) return;
      if (k === currentSort.key) {
        el.textContent = currentSort.direction === 'asc' ? '↑' : '↓';
      } else {
        el.textContent = '·';
      }
    });
  }

  function render() {
    listEl.innerHTML = '';
    bags.forEach(bag => {
      const row = document.createElement('div');
      row.className = 'row';

      const line = document.createElement('div');
      line.className = 'line';

      const brand = document.createElement('span');
      brand.className = 'brand';
      brand.textContent = bag.brand;

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = bag.name;

      const prices = document.createElement('div');
      prices.className = 'prices';

      if (bag.links && bag.links.length > 0) {
        bag.links.forEach(l => {
          const link = document.createElement('a');
          link.href = l.u;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';

          const site = document.createElement('span');
          site.className = 'site';
          site.textContent = 'READ: ' + l.r;

          link.appendChild(site);
          prices.appendChild(link);
        });
      }

      line.appendChild(brand);
      line.appendChild(name);
      line.appendChild(prices);
      row.appendChild(line);
      listEl.appendChild(row);
    });
  }

  sortButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-sort');
      if (currentSort.key === key) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.key = key;
        currentSort.direction = 'asc';
      }
      sortBags();
      updateIndicators();
      render();
    });
  });

  sortBags();
  updateIndicators();
  render();
})();
</script>
</body>
</html>
