<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:   #111;
  --muted: #888;
  --rule:  #111;
  --r2:    #e0e0e0;
  --hover: #f6f6f4;
}
html { font-size: 14px; }
body { font-family: 'Faculty Glyphic', Georgia, serif; font-size: 14px; line-height: 1.45; background: #fff; color: var(--ink); -webkit-font-smoothing: antialiased; }
*, input, button { font-family: 'Faculty Glyphic', Georgia, serif; font-size: 14px; }
a { color: inherit; text-decoration: none; }
a:hover { text-decoration: underline; }
a:focus-visible { outline: 2px solid #0057b8; outline-offset: 2px; }

header { border-bottom:1px solid var(--rule); padding:13px 20px; display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.meta { color:var(--muted); }
.meta span+span::before { content:' · '; }

main { padding: 10px 20px 20px; }

/* Header row for sorting */
.header-row { border-bottom:1px solid var(--rule); padding:6px 0 7px; display:flex; align-items:center; gap:16px; }
.header-label { cursor:pointer; user-select:none; display:inline-flex; align-items:center; gap:4px; }
.header-label span.sort-indicator { font-size:11px; color:var(--muted); }
.header-spacer { flex:1; }

.row { border-bottom:1px solid var(--r2); padding:6px 0 7px; transition:background 0.08s; }
.row:hover { background:var(--hover); }
.line { display:flex; flex-wrap:wrap; gap:6px 16px; align-items:baseline; }
.name { }
.brand { color:var(--muted); }
.prices { display:flex; flex-wrap:wrap; gap:6px 12px; }
.prices a { display:inline-flex; gap:4px; align-items:baseline; padding:0 4px 0 0; border-right:1px solid var(--r2); text-decoration:none; }
.prices a:last-child { border-right:none; }
.site { color:var(--muted); }
.amount { }
.ship { color:#bbb; font-size:12px; }

footer { border-top:1px solid var(--rule); padding:11px 20px; display:flex; justify-content:space-between; color:var(--muted); }

@media (max-width:500px) { header,main { padding-left:14px; padding-right:14px; } }
</style>
</head>
<body>

<header>
  <span>TOTE</span>
  <span class="meta"><span id="hd-n">100 bags</span><span>40+ sources</span><span>Mar 2025</span></span>
</header>

<main aria-label="Tote bags list">
  <div class="header-row" aria-hidden="true">
    <button type="button" class="header-label" data-sort="name">
      <span>Title</span>
      <span class="sort-indicator" data-indicator="name">·</span>
    </button>
    <button type="button" class="header-label" data-sort="brand">
      <span>Brand</span>
      <span class="sort-indicator" data-indicator="brand">·</span>
    </button>
    <button type="button" class="header-label" data-sort="price">
      <span>Price</span>
      <span class="sort-indicator" data-indicator="price">·</span>
    </button>
    <div class="header-spacer"></div>
  </div>

  <div id="list"></div>
</main>

<footer>
  <span>Prices subject to change · Affiliate links</span>
  <span>tote.so</span>
</footer>

<script>
(async function() {
  const listEl = document.getElementById('list');
  const sortButtons = document.querySelectorAll('.header-label');
  const indicators = {
    name: document.querySelector('[data-indicator="name"]'),
    brand: document.querySelector('[data-indicator="brand"]'),
    price: document.querySelector('[data-indicator="price"]'),
  };

  let data;
  try {
    const res = await fetch('/data/bags.json');
    data = await res.json();
  } catch (err) {
    console.error('failed to load data', err);
    return;
  }

  let bags = data.bags.slice();
  let currentSort = { key: 'price', direction: 'asc' };

  function getLowestPrice(bag) {
    if (!bag.prices || !bag.prices.length) return Infinity;
    return Math.min(...bag.prices.map(p => p.p));
  }

  function sortBags() {
    const { key, direction } = currentSort;
    const dir = direction === 'asc' ? 1 : -1;

    bags.sort((a, b) => {
      if (key === 'name') {
        return a.name.localeCompare(b.name) * dir;
      }
      if (key === 'brand') {
        return a.brand.localeCompare(b.brand) * dir;
      }
      if (key === 'price') {
        const pa = getLowestPrice(a);
        const pb = getLowestPrice(b);
        return (pa - pb) * dir;
      }
      return 0;
    });
  }

  function updateIndicators() {
    Object.keys(indicators).forEach(k => {
      const el = indicators[k];
      if (!el) return;
      if (k === currentSort.key) {
        el.textContent = currentSort.direction === 'asc' ? '↑' : '↓';
      } else {
        el.textContent = '·';
      }
    });
  }

  function render() {
    listEl.innerHTML = '';
    bags.forEach(bag => {
      const row = document.createElement('div');
      row.className = 'row';

      const line = document.createElement('div');
      line.className = 'line';

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = bag.name;

      const brand = document.createElement('span');
      brand.className = 'brand';
      brand.textContent = bag.brand;

      const prices = document.createElement('div');
      prices.className = 'prices';

      bag.prices
        .slice()
        .sort((a, b) => a.p - b.p)
        .forEach(p => {
          const link = document.createElement('a');
          link.href = p.u;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';

          const site = document.createElement('span');
          site.className = 'site';
          site.textContent = p.r;

          const amount = document.createElement('span');
          amount.className = 'amount';
          amount.textContent = `$${p.p}`;

          const ship = document.createElement('span');
          ship.className = 'ship';
          ship.textContent = p.s;

          link.appendChild(site);
          link.appendChild(amount);
          link.appendChild(ship);
          prices.appendChild(link);
        });

      line.appendChild(name);
      line.appendChild(brand);
      line.appendChild(prices);
      row.appendChild(line);
      listEl.appendChild(row);
    });
  }

  sortButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-sort');
      if (currentSort.key === key) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.key = key;
        currentSort.direction = key === 'price' ? 'asc' : 'asc';
      }
      sortBags();
      updateIndicators();
      render();
    });
  });

  sortBags();
  updateIndicators();
  render();
})();
</script>
</body>
</html>
