<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Flor de Ruina Semilla';
  src: url('./fonts/FlorDeRuina-Semilla.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:   #000;
  --bg:    #fff;
  --accent: #ccff00; /* Harsh yellow-green */
  --rule:  #000;
}
html { font-size: 16px; }
body {
  font-family: "Faculty Glyphic", sans-serif;
  font-weight: normal;
  font-size: 1rem;
  line-height: 1.2;
  letter-spacing: 0.04em;
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--ink);
  min-height: 100vh;
}
*, input, button { font-family: inherit; font-size: inherit; font-weight: inherit; text-transform: inherit; color: inherit; background: none; border: none; }
a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--ink); }
a:hover { background: var(--accent); color: var(--ink); border-bottom-color: transparent; }
a:focus-visible { outline: 1px solid var(--accent); background: var(--ink); color: var(--bg); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

header {
  border-bottom: 1px solid var(--rule);
  padding: 20px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  background: var(--ink);
  color: var(--bg);
}
header span:first-child {
  font-family: 'Flor de Ruina Semilla', sans-serif;
  font-size: 2.5rem;
  letter-spacing: -1px;
}

.category-nav {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 10px;
}
.category-btn {
  padding: 4px 12px;
  border: 1px solid var(--rule);
  cursor: pointer;
  background: var(--bg);
  color: var(--ink);
  transition: all 0.2s;
}
.category-btn:hover {
  background: var(--accent);
}
.category-btn.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--bg);
}
.category-btn.active::before {
  content: '● ';
  font-size: 0.8em;
  color: var(--accent);
}

.meta { display: flex; gap: 16px; font-size: 0.8rem; }
.meta span+span::before { content:' // '; }

main { padding: 0; }

/* Header row for sorting */
.header-row {
  border-bottom: 1px solid var(--rule);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  background: #f0f0f0;
}
.header-label {
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  border: 1px solid transparent;
}
.header-label:hover { border-color: var(--ink); background: var(--accent); }
.header-label span.sort-indicator { font-size: 1rem; }
.header-spacer { flex:1; }

.row {
  border-bottom: 1px solid var(--rule);
  padding: 16px 20px;
  transition: all 0s; /* No soft transitions in brutalism */
}
.row:hover {
  background: var(--ink);
  color: var(--bg);
}
.row:hover .brand { color: var(--bg); }
.row:hover a { border-color: var(--bg); }
.row:hover a:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }

.line { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: baseline; }
.name { font-size: 1rem; }
.brand { color: #555; }
.row:hover .brand { color: #aaa; }

.prices { display: flex; flex-wrap: wrap; gap: 8px 16px; }
.prices a {
  display: inline-flex;
  gap: 8px;
  align-items: baseline;
  padding: 4px 8px;
  border: 1px solid var(--ink);
  background: var(--bg);
  color: var(--ink);
}
.row:hover .prices a {
  border-color: var(--bg);
}
.site { font-weight: bold; }
.amount { }
.ship { display: none; } /* Hide shipping for brutalist look */

footer {
  border-top: 1px solid var(--rule);
  padding: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  background: var(--ink);
  color: var(--bg);
}

@media (max-width:600px) {
  header, main .header-row, .row, footer { padding-left: 10px; padding-right: 10px; }
  .meta { flex-direction: column; gap: 4px; }
  .meta span+span::before { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span>TOTE</span>
    <nav class="category-nav" id="category-nav" aria-label="Categories">
      <!-- Nav buttons will be injected here -->
    </nav>
  </div>
  <span class="meta"><span id="hd-n"></span><span>40+ sources</span><span>Mar 2025</span></span>
</header>

<main aria-label="Items list">
  <div class="header-row">
    <button type="button" class="header-label" data-sort="brand">
      <span>Brand</span>
      <span class="sort-indicator" data-indicator="brand">·</span>
    </button>
    <button type="button" class="header-label" data-sort="name">
      <span>Title</span>
      <span class="sort-indicator" data-indicator="name">·</span>
    </button>
    <button type="button" class="header-label" data-sort="price">
      <span>Price</span>
      <span class="sort-indicator" data-indicator="price">·</span>
    </button>
    <div class="header-spacer"></div>
  </div>

  <div id="list" aria-live="polite"></div>
</main>

<footer>
  <span>Articles on the coolest totes on the web</span>
  <span>tote.so</span>
</footer>

<script>
(async function() {
  const listEl = document.getElementById('list');
  const sortButtons = document.querySelectorAll('.header-label');
  const countEl = document.getElementById('hd-n');
  const navEl = document.getElementById('category-nav');
  const indicators = {
    name: document.querySelector('[data-indicator="name"]'),
    brand: document.querySelector('[data-indicator="brand"]'),
    price: document.querySelector('[data-indicator="price"]')
  };

  const categories = [
    { id: 'bags', name: 'Bags', file: '/data/bags.json', dataKey: 'bags', unit: 'bags', actionText: 'BUY' },
    { id: 'coffee', name: 'Coffee beans', file: '/data/coffee.json', dataKey: 'items', unit: 'items', actionText: 'BUY' },
    { id: 'books', name: 'Books', file: '/data/books.json', dataKey: 'books', unit: 'books', actionText: 'BUY' },
    { id: 'prospect_heights', name: 'Prospect Heights', file: '/data/prospect_heights.json', dataKey: 'places', unit: 'places', actionText: 'VISIT' }
  ];

  // ⚡ Bolt Optimization: Cache category data to prevent redundant network requests
  const categoryCache = {};

  let currentCategory = categories[0];
  let items = [];
  let currentSort = { key: 'brand', direction: 'asc' };

  function renderNav() {
    navEl.innerHTML = '';
    categories.forEach((cat, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'category-btn';
      if (cat.id === currentCategory.id) {
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
      } else {
        btn.setAttribute('aria-pressed', 'false');
      }
      btn.textContent = `[${index + 1}] ${cat.name}`;
      btn.addEventListener('click', () => {
        if (cat.id !== currentCategory.id) {
          currentCategory = cat;
          loadCategoryData();
        }
      });
      navEl.appendChild(btn);
    });
  }

  async function loadCategoryData() {
    renderNav();
    listEl.innerHTML = 'Loading...';

    // ⚡ Bolt Optimization: Use cached data if available
    if (categoryCache[currentCategory.id]) {
      items = categoryCache[currentCategory.id].slice();
    } else {
      try {
        const res = await fetch(currentCategory.file);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();

        const categoryItems = data[currentCategory.dataKey] || [];
        categoryCache[currentCategory.id] = categoryItems;
        items = categoryItems.slice();
      } catch (err) {
        console.error('failed to load data', err);
        listEl.innerHTML = 'Error loading data.';
        items = [];
        return;
      }
    }

    currentSort = { key: 'brand', direction: 'asc' };
    sortItems();
    updateIndicators();
    render();
  }

  function sortItems() {
    const { key, direction } = currentSort;
    const dir = direction === 'asc' ? 1 : -1;

    items.sort((a, b) => {
      if (key === 'name') {
        return a.name.localeCompare(b.name) * dir;
      }
      if (key === 'brand') {
        return a.brand.localeCompare(b.brand) * dir;
      }
      if (key === 'price') {
        const p1 = typeof a.price === 'number' ? a.price : Infinity;
        const p2 = typeof b.price === 'number' ? b.price : Infinity;
        if (p1 === p2) return 0;
        return (p1 < p2 ? -1 : 1) * dir;
      }
      return 0;
    });
  }

  function updateIndicators() {
    Object.keys(indicators).forEach(k => {
      const el = indicators[k];
      if (!el) return;
      if (k === currentSort.key) {
        el.textContent = currentSort.direction === 'asc' ? '↑' : '↓';
      } else {
        el.textContent = '·';
      }
    });
  }

  function render() {
    listEl.innerHTML = '';
    countEl.textContent = `${items.length} ${currentCategory.unit}`;

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'row';

      const line = document.createElement('div');
      line.className = 'line';

      const brand = document.createElement('span');
      brand.className = 'brand';
      brand.textContent = item.brand;

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = item.name;

      let address = null;
      if (item.address) {
        address = document.createElement('span');
        address.className = 'address';
        address.textContent = item.address;
        address.style.color = '#777';
        address.style.fontSize = '0.9rem';
      }

      const prices = document.createElement('div');
      prices.className = 'prices';

      if (item.links && item.links.length > 0) {
        item.links.forEach(l => {
          const link = document.createElement('a');
          link.href = l.u;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';

          const site = document.createElement('span');
          site.className = 'site';
          site.textContent = (currentCategory.actionText || 'BUY') + ': ' + l.r;

          link.appendChild(site);

          if (typeof item.price === 'number') {
            const amount = document.createElement('span');
            amount.className = 'amount';
            amount.textContent = '$' + item.price.toLocaleString();
            link.appendChild(amount);
          }

          prices.appendChild(link);
        });
      }

      line.appendChild(brand);
      line.appendChild(name);
      if (address) line.appendChild(address);
      line.appendChild(prices);
      row.appendChild(line);
      listEl.appendChild(row);
    });
  }

  sortButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.getAttribute('data-sort');
      if (currentSort.key === key) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.key = key;
        currentSort.direction = 'asc';
      }
      sortItems();
      updateIndicators();
      render();
    });
  });

  window.addEventListener('keydown', (e) => {
    // Ignore keydown if a modifier is pressed or if user is typing in an input
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    const num = parseInt(e.key, 10);
    if (!isNaN(num) && num >= 1 && num <= categories.length) {
      const catIndex = num - 1;
      const targetCategory = categories[catIndex];
      if (targetCategory && targetCategory.id !== currentCategory.id) {
        currentCategory = targetCategory;
        loadCategoryData();
      }
    }
  });

  // Init
  loadCategoryData();
})();
</script>
</body>
</html>
