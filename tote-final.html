<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:   #111;
  --muted: #888;
  --lo:    #0a5c2e;
  --hi:    #bbb;
  --rule:  #111;
  --r2:    #e0e0e0;
  --hover: #f6f6f4;
}
html { font-size: 14px; }
body { font-family: 'Faculty Glyphic', Georgia, serif; font-size: 14px; line-height: 1.45; background: #fff; color: var(--ink); -webkit-font-smoothing: antialiased; }
*, input, button { font-family: 'Faculty Glyphic', Georgia, serif; font-size: 14px; }
a { color: inherit; text-decoration: none; }
a:hover { text-decoration: underline; }
a:focus-visible { outline: 2px solid #0057b8; outline-offset: 2px; }
button { background: none; border: none; cursor: pointer; line-height: 1.45; color: inherit; }

.skip { position:fixed; top:-100%; left:12px; z-index:999; background:var(--ink); color:#fff; padding:6px 14px; text-decoration:none; }
.skip:focus { top:8px; }
.sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }

header { border-bottom:1px solid var(--rule); padding:13px 20px; display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.meta { color:var(--muted); }
.meta span+span::before { content:' · '; }

.search-row { border-bottom:1px solid var(--rule); display:flex; align-items:baseline; padding:0 20px; }
#search { flex:1; padding:10px 0; border:none; background:none; outline:none; color:var(--ink); }
#search::placeholder { color:var(--muted); }
#count { color:var(--muted); padding-left:20px; white-space:nowrap; }

.filters { border-bottom:1px solid var(--rule); display:flex; overflow-x:auto; scrollbar-width:none; }
.filters::-webkit-scrollbar { display:none; }
.fb { flex-shrink:0; padding:8px 16px; color:var(--muted); border-right:1px solid var(--r2); white-space:nowrap; }
.fb:last-child { border-right:none; }
.fb:hover { color:var(--ink); }
.fb.on { color:var(--ink); text-decoration:underline; text-underline-offset:4px; }

.col-hd { border-bottom:1px solid var(--r2); padding:7px 20px; display:grid; grid-template-columns:32px 1fr; color:var(--muted); }

.row { display:grid; grid-template-columns:32px 1fr; border-bottom:1px solid var(--r2); padding:0 20px; transition:background 0.08s; }
.row:hover { background:var(--hover); }
.rn { color:var(--r2); padding-top:11px; user-select:none; }
.rb { padding:11px 0; }
.rt { display:flex; flex-wrap:wrap; align-items:baseline; gap:0 8px; margin-bottom:5px; }
.brand { color:var(--muted); }
.tag { border:1px solid var(--r2); color:var(--muted); padding:0 5px; line-height:1.7; font-size:12px; }
.tag.sale { color:var(--lo); border-color:var(--lo); }

.pl { display:flex; flex-wrap:wrap; margin-left:-10px; }
.pl a { display:inline-flex; align-items:baseline; gap:5px; padding:2px 10px; border-right:1px solid var(--r2); white-space:nowrap; transition:background 0.08s; }
.pl a:last-child { border-right:none; }
.pl a:hover { background:#ececea; text-decoration:none; }
.pr { color:var(--muted); }
.pp.lo { color:var(--lo); }
.pp.hi { color:var(--hi); }
.ps { color:#bbb; font-size:12px; }

footer { border-top:1px solid var(--rule); padding:11px 20px; display:flex; justify-content:space-between; color:var(--muted); }

@media (max-width:500px) { header,.col-hd,.row,.search-row { padding-left:14px; padding-right:14px; } }
</style>
</head>

<a href="#list" class="skip">Skip to content</a>

</div>

  <button class="fb"    data-f="u100"    aria-pressed="false">Under $100</button>
  <button class="fb"    data-f="u300"    aria-pressed="false">Under $300</button>
  <button class="fb"    data-f="canvas"  aria-pressed="false">Canvas</button>

  <button class="fb"    data-f="sale"    aria-pressed="false">On sale</button>

</div>

<div class="col-hd" aria-hidden="true">

  <span>Bag · Prices by retailer, cheapest first</span>
</div>

<main id="list" role="list"></main>

// Sort by lowest price
BAGS.sort((a,b) => Math.min(...a.prices.map(p=>p.p)) - Math.min(...b.prices.map(p=>p.p)));

let activeF='all', q='';

function loP(b){ return Math.min(...b.prices.map(p=>p.p)); }

function apply(){
  return BAGS.filter(b=>{
    const lo=loP(b);
    if(activeF==='u100'    && lo>=100)           return false;
    if(activeF==='u300'    && lo>=300)           return false;
    if(activeF==='canvas'  && b.mat!=='canvas')  return false;
    if(activeF==='leather' && b.mat!=='leather') return false;
    if(activeF==='nylon'   && b.mat!=='nylon')   return false;
    if(activeF==='sale'    && !b.sale)           return false;
    if(activeF==='luxury'  && lo<500)            return false;
    if(q){ const s=q.toLowerCase(); if(!b.brand.toLowerCase().includes(s)&&!b.name.toLowerCase().includes(s)) return false; }
    return true;
  });
}

function render(){
  const list=document.getElementById('list');
  const bags=apply();
  document.getElementById('count').textContent=bags.length+' result'+(bags.length!==1?'s':'');
  list.innerHTML='';

  bags.forEach((b,i)=>{
    const sorted=[...b.prices].sort((a,z)=>a.p-z.p);
    const links=sorted.map((p,pi)=>{
      const cls=pi===0?'lo':(pi===sorted.length-1&&sorted.length>1?'hi':'');
      return `<a href="${p.u}" target="_blank" rel="noopener noreferrer" aria-label="${p.r} — $${p.p}, ${p.s}"><span class="pr">${p.r}</span><span class="pp ${cls}">$${p.p}</span><span class="ps">${p.s}</span></a>`;
    }).join('');

    const row=document.createElement('div');
    row.className='row';
    row.setAttribute('role','listitem');
    row.innerHTML=`
      <span class="rn" aria-hidden="true">${String(i+1).padStart(2,'0')}</span>
      <div class="rb">
        <div class="rt">
          <span class="brand">${b.brand}</span>
          <span class="name">${b.name}</span>
          <span class="tag">${b.mat}</span>${b.sale?'<span class="tag sale">sale</span>':''}
        </div>
        <div class="pl" role="list" aria-label="Prices for ${b.brand} ${b.name}">${links}</div>
      </div>`;
    list.appendChild(row);
  });
}

document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(b=>{b.classList.remove('on');b.setAttribute('aria-pressed','false');});
    btn.classList.add('on'); btn.setAttribute('aria-pressed','true');
    activeF=btn.dataset.f; render();
  });
});

document.getElementById('search').addEventListener('input',e=>{ q=e.target.value.trim(); render(); });

render();
